<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Minhas Visitas</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
max-width:800px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px;
background:#2563eb;
color:white;
border:none;
}

.item{
background:#eef2ff;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.proximo{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>Consultar Visita</h2>

<input id="telefone"
placeholder="Telefone">

<button onclick="buscar()">
Consultar
</button>

<div id="resultado"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBSQrG5bdCGC_6kUQxccgJxz2gtLiB2Kb4",
authDomain: "sistema-os-1284b.firebaseapp.com",
projectId: "sistema-os-1284b",
storageBucket: "sistema-os-1284b.appspot.com",
messagingSenderId: "1032102605721",
appId: "1:1032102605721:web:7eba5fc6e4eb9fc17ad908"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.buscar = async ()=>{

resultado.innerHTML="";

const q = query(
collection(db,"visitas"),
where("telefone","==",telefone.value)
);

const snap = await getDocs(q);

snap.forEach(doc=>{

const v = doc.data();

const visita =
new Date(`${v.data}T${v.hora}`);

const agora =
new Date();

let msg="";

const horas =
(visita-agora)/3600000;

if(horas<=24 && horas>2)
msg="🟢 Visita próxima";

if(horas<=2 && horas>0)
msg="🚗 Técnico a caminho";

if(horas<=0)
msg="✅ Atendimento iniciado";

resultado.innerHTML += `

<div class="item">

<h3>${v.tipo}</h3>

<p>OS: ${v.osnum}</p>

<p>Data: ${v.data}</p>

<p>Hora: ${v.hora}</p>

<p>Status: ${v.status}</p>

<p class="proximo">${msg}</p>

</div>

`;

});

}

</script>

</body>
</html>
